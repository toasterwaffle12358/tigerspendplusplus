<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dining Statistics</title>
  <link rel="stylesheet" href="dining.css">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0B3XE5MMCZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-0B3XE5MMCZ');
</script>
<body>
  <header class="dining-header">
    <div class="header-content">
      <a href="index.html" class="back-btn" title="Go back">← main page</a>
      <h2>Dining Statistics</h2>
    </div>
    <div id="content">Loading...</div>
  </header>
  <div class="allgraphs">
    <div class="graphs_container">
        <canvas id="balanceTime" class="linechart"></canvas>
    </div>
    <div class="graphs_container">
        <canvas id="myChart" class="piechart"></canvas>
    </div>
    <div class="graphs_container">
        <canvas id="myChartVisits" class="piechart"></canvas>
    </div>
    <div class="graphs_container">
        <div class="breakdown">
            <h2 class="breakdown_header">Spending Breakdown</h2>
            <hr class="solid">
            <h3 id="avgSpend">Average Spending per Day (last 4 weeks)</h3>
            <p id="avgSpendValue" class="breakdownValue">example</p>
            <h3 id="avgSpendLeft1000">Amount Left to Spend per Day (ending with $1000)</h3>
            <p id="avgSpendLeftValue1000" class="breakdownValue">example</p>
            <h3 id="avgSpendLeft">Amount Left to Spend per Day (ending with $0)</h3>
            <p id="avgSpendLeftValue" class="breakdownValue">example</p>
            <div class="progressContainer">
                % through the semester
                <div class="progressBar">
                  <div class="dateProgress" id="dateProgressID">
                    50%
                  </div>
                </div>
            </div>
            <div class="progressContainer">
                % of dining dollars spent
                <div class="progressBar">
                  <div class="spendProgress" id="spendProgressID">
                    70%
                  </div>
                </div>
            </div>
        </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/min/moment.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@1.0.1/dist/chartjs-adapter-moment.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script src="dining.js"></script>
</body>
</html>
