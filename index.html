<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>TigerSpend++</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<div class="construction-banner">
		<span>🚧</span> Website still under active construction, so like dont expect it to be perfect <span>🚧</span>
	</div>
	<a href="how-to.html" class="how-to-btn" title="View how to use">?</a>
	<header class="site-header">
		<h1>TigerSpend++</h1>
	</header>

	<main>
		<div class="content-box">
			<p class="lead" id="uploadText">Upload CSV File(s)</p>
			<input id="csvInput" type="file" accept=".csv,text/csv" multiple style="display:none" />
			<div id="fileListContainer" style="display:none; margin-top:1rem;">
				<div id="fileList" class="file-list"></div>
			</div>
			<div id="viewStatsContainer" style="display:none; margin-top:1rem;">
				<button id="uploadAnotherBtn" class="upload-another-btn">Upload Another</button>
				<button id="viewStatsBtn" class="view-stats-btn">View Statistics</button>
			</div>
		</div>
	</main>

	<script src="script.js"></script>
</body>
</html>
