<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gathering CSV Information</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="redirect.css">
</head>
<!-- Google tag (gtag.js) -->

<body>
    <div class="content-box redirect-box">
        <h1>Gathering CSV information...</h1>
        <p id="status-message">Hang tight, your file is being processed and you’ll be redirected shortly.</p>
        <div class="progress-container" aria-hidden="true">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="progress-label">Loading rollover CSV</p>
        <div class="progress-container" aria-hidden="true">
            <div class="progress-bar" id="csvProgressBar"></div>
        </div>
        <div>
            <h3>Options:</h3>
                <div class="checkbox-container">
                    <div class="checkbox-wrapper-7">
                        <input class="tgl tgl-ios" id="cb2-7" type="checkbox" onclick="thistermfunc(this.checked)"/>
                        <label class="tgl-btn" for="cb2-7"></label>
                    </div>
                    <div class="account-label">
                        Data from this term only
                    </div>
                </div>
        </div>
        <div class="stats-button">
            <button id="viewStatsBtn" class="view-stats-btn grow"onclick="window.location.href='dining.html';">View Statistics</button>
        </div>
    </div>
    <script src="redirect.js"></script>
</body>
