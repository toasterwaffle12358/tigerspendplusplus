<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gathering CSV Information</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="redirect.css">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0B3XE5MMCZ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-0B3XE5MMCZ');
</script>
<body>
    <div class="content-box redirect-box">
        <h1>Unfortunately RIT no longer allows automatic CSV fetching, you must download the CSV files manually.</h1>
        <div class="downloads-panel">
            <h2>Downloads</h2>
            <div class="csv-download-buttons">
                <button id="mainCsvBtn" type="button" class="csv-download-btn">Main CSV</button>
                <button id="rolloverCsvBtn" type="button" class="csv-download-btn">Rollover CSV</button>
            </div>
        </div>
        <div class="uploads-panel">
            <h2>Uploads</h2>
            <div class="csv-upload-buttons">
                <input type="file" id="mainCsvUpload" accept=".csv" class="csv-upload-input" style="display: none;">
                <label for="mainCsvUpload" class="csv-upload-btn">Main CSV</label>
                <input type="file" id="rolloverCsvUpload" accept=".csv" class="csv-upload-input" style="display: none;">
                <label for="rolloverCsvUpload" class="csv-upload-btn">Rollover CSV</label>
            </div>
        </div>
        <div class="stats-button">
            <button id="viewStatsBtn" class="view-stats-btn" onclick="window.location.href='dining.html';">View Statistics</button>
        </div>
    </div>
    <script src="redirect.js"></script>
</body>
</html>
